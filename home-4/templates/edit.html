{% extends "base.html" %}

{% block content %}

<h2>Edit Book</h2>

<form method="POST" action="{{ url_for('edit_post', id=book.id) }}">

    <label>Title</label>
    <input type="text" name="title" value="{{ book.title }}" required>

    <label>Author</label>
    <input type="text" name="author" value="{{ book.author }}" required>

    <label>ISBN</label>
    <input type="text" name="isbn" value="{{ book.isbn }}" required>

    <label>Price</label>
    <input type="number" step="0.01" name="price" value="{{ book.price }}" required>

    <label>Category</label>
    <select name="categoryId" required>
        {% for category in categories %}
            {% if category.id == book.categoryId %}
                <option value="{{ category.id }}" selected>{{ category.name }}</option>
            {% else %}
                <option value="{{ category.id }}">{{ category.name }}</option>
            {% endif %}
        {% endfor %}
    </select>

    <label>Image Filename</label>
    <input type="text" name="image" value="{{ book.image }}" required>

    <label>Read Now</label>
    <select name="readNow" required>
        {% if book.readNow == 0 %}
            <option value="0" selected>0 - No</option>
            <option value="1">1 - Yes</option>
        {% else %}
            <option value="0">0 - No</option>
            <option value="1" selected>1 - Yes</option>
        {% endif %}
    </select>

    <button type="submit">Update Book</button>
    <a class="button secondary" href="{{ url_for('read') }}">Cancel</a>

</form>

{% endblock %}
